baseURL: https://jaswdr.dev/
title: "Jonathan Schweder"
languageCode: en-us
theme: toha
defaultContentLanguage: en

# Allow raw html in markdown file
markup:
  goldmark:
    renderer:
      unsafe: true

# Enable global emoji support
enableEmoji: true

# Site parameters
params:
  # Background image of the landing page
  background: images/site/background.jpg

  # Provide logos for your site.
  logo:
    main: images/me.webp
    inverted: images/me.webp
    favicon: favicon.png

  # GitHub repo of your site
  gitRepo: https://github.com/jaswdr/blog
  gitBranch: main

  # Configure the number of section title visible in the top navbar
  topNavbar:
    maxVisibleSections: 5

  # Configure various features of this theme
  features:
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: system

    portfolio:
      enable: true

    blog:
      enable: false

    notes:
      enable: false

    comment:
      enable: false

    analytics:
      enable: false

    toc:
      enable: true

    tags:
      enable: true
      on_card: true

    flags:
      enable: true

    embedpdf:
      enable: true

    flowchart:
      enable: true
      services:
        mermaid:
          theme: default
          darkTheme: dark

    math:
      enable: true

    syntaxHighlight:
      enable: true

    videoPlayer:
      enable: true

    copyCodeButton:
      enable: true

  footer:
    enable: true
    navigation:
      enable: true
      customMenus: true
    contactMe:
      enable: true
    newsletter:
      enable: false
    credentials:
      enable: true
    disclaimer:
      enable: false

languages:
  en:
    languageCode: en
    languageName: English
    title: "Jonathan Schweder"
    weight: 1

# Module configuration if using Hugo Modules (optional if theme is in themes/toha)
# module:
#   imports:
#     - path: themes/toha
