name: Build and validate

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.3"
          extended: true

      - name: Build
        run: hugo --minify --destination public

      - name: Validate machine-readable outputs
        run: |
          python3 - <<'PY'
          import json, pathlib
          out = pathlib.Path("public")

          cv = json.loads((out / "cv.json").read_text())
          assert cv["basics"]["name"], "cv.json: basics.name missing"
          assert cv["work"], "cv.json: work is empty"
          assert cv["skills"], "cv.json: skills is empty"
          assert cv.get("education"), "cv.json: education is empty"

          for name in ("llms.txt", "cv.txt"):
              text = (out / name).read_text()
              assert text.startswith("# Jonathan Schweder"), f"{name}: missing expected heading"
              assert "## Experience" in text, f"{name}: missing Experience section"
              assert "## Education" in text, f"{name}: missing Education section"
              assert "<" not in text.split("\n")[0], f"{name}: unexpected markup"

          print("llms.txt, cv.txt, cv.json OK")
          PY
