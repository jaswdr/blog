<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found | {{ .Site.Title }}</title>
<meta name="robots" content="noindex">
<style>
:root{color-scheme:light dark;
  --paper:light-dark(#f5f4ef,#151619);--ink:light-dark(#1b1c1e,#dcdad2);
  --muted:light-dark(#66675f,#8f9089);--accent:light-dark(#9a5b0f,#dca55c)}
body{background:var(--paper);color:var(--ink);
  font:16px/1.65 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  display:grid;place-items:center;min-height:100vh;margin:0}
main{text-align:center;padding:1.5rem}
h1{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  font-size:1rem;font-weight:400;color:var(--muted)}
h1::after{content:":";color:var(--accent)}
p{margin-top:.75rem}
a{color:var(--accent)}
</style>
</head>
<body>
<main>
  <h1>404</h1>
  <p>This page does not exist. <a href="/">Back to the home page</a>.</p>
</main>
</body>
</html>
